name: talent-flow-ats

services:
  backend:
    container_name: talent-flow-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: talent_flow_ats
      DB_USER: postgres
      DB_PASSWORD: Pass2020NothingSpecial
      SECRET_KEY: supersecretkey1234567890123456
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - ./backend:/backend
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:4000 --timeout 60 --graceful-timeout 30

  migrations:
    image: talent-flow-ats-backend
    profiles: ["migrate"]
    volumes:
      - ./backend:/backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: talent_flow_ats
      DB_USER: postgres
      DB_PASSWORD: Pass2020NothingSpecial
    entrypoint: ["sh", "/backend/scripts/run_migrations.sh"]
    command: ["upgrade", "head"]

  db:
    container_name: talent-flow-postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: talent_flow_ats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pass2020NothingSpecial
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Performance tuning for 50-100 concurrent candidates
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

volumes:
  postgres_data:
