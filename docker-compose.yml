name: talent-flow-ats

services:
  backend:
    container_name: talent-flow-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: talent_flow_ats
      DB_USER: postgres
      DB_PASSWORD: Pass2020NothingSpecial
      SECRET_KEY: supersecretkey1234567890123456789032
      HF_TOKEN: ${HF_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Kolkata
    volumes:
      - ./backend:/backend
      - .env:/backend/.env:ro
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:4000 --timeout 60 --graceful-timeout 30 --reload

  frontend:
    container_name: talent-flow-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser directly calls backend — use server IP or domain, not container name
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-prod}
        NEXT_PUBLIC_ENABLE_AI_QUESTION_GENERATOR: ${NEXT_PUBLIC_ENABLE_AI_QUESTION_GENERATOR:-false}
    environment:
      # SSR (server-side) calls go through Docker network to backend container
      BACKEND_URL: http://backend:4000
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend

  migrations:
    image: talent-flow-ats-backend
    profiles: ["migrate"]
    volumes:
      - ./backend:/backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: talent_flow_ats
      DB_USER: postgres
      DB_PASSWORD: Pass2020NothingSpecial
    # Normalize CRLF -> LF at runtime, then execute the script.
    entrypoint:
      [
        "sh",
        "-c",
        "tr -d '\\r' < /backend/scripts/run_migrations.sh > /tmp/run_migrations.sh && exec sh /tmp/run_migrations.sh \"$@\"",
        "--",
      ]
    command: ["upgrade", "head"]

  db:
    container_name: talent-flow-postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: talent_flow_ats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pass2020NothingSpecial
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Performance tuning for 50-100 concurrent candidates
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  redis:
    container_name: talent-flow-redis
    image: redis/redis-stack:latest
    restart: always
    ports:
      - "6379:6379"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backup-logs:
    container_name: talent-flow-backup-logs
    image: busybox
    restart: always
    volumes:
      - ./backend/backups:/backups:ro
    command: tail -F /backups/backup.log

volumes:
  postgres_data:
